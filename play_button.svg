  <text x="136" y="102" font-family="'Arial Black',sans-serif" font-size="36" fill="#a30025" text-anchor="middle">7</text>
  <rect x="172" y="60" width="56" height="60" rx="6" fill="#fff5e0" stroke="#161013" stroke-width="3"/>
  <text x="200" y="102" font-family="'Arial Black',sans-serif" font-size="36" fill="#a30025" text-anchor="middle">7</text>

