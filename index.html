    --red-deep: #a30025;
    --blue: #1c8ce8;
    --pink: #ff5fa2;
    --black: #161013;
    --cream: #fff5e0;
    --neon: #00ffd5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    font-family: 'Gowun Dodum', sans-serif;
    background:
      radial-gradient(circle at 20% 10%, #3a0a1a 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, #0a1a3a 0%, transparent 45%),

    color: var(--cream);
    overflow-x: hidden;
  }

  /* 전구 테두리 */
  .bulb-frame { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
  .bulb-frame::before, .bulb-frame::after {
    content: '';
    position: absolute; left: 0; right: 0; height: 24px;
    background-image: radial-gradient(circle, var(--gold) 0 5px, transparent 6px);
    background-size: 28px 24px;
    background-repeat: repeat-x;
    filter: drop-shadow(0 0 6px var(--gold));
    animation: blink 1.2s infinite alternate;

  .bulb-frame::before { top: 0; }
  .bulb-frame::after { bottom: 0; animation-delay: .6s; }
  @keyframes blink {
    0%, 49% { filter: drop-shadow(0 0 8px var(--gold)) brightness(1); }
    50%, 100% { filter: drop-shadow(0 0 2px var(--red)) brightness(.55); background-image: radial-gradient(circle, var(--red) 0 5px, transparent 6px); }

  header { text-align: center; margin-bottom: 40px; }

    font-family: 'Bagel Fat One', sans-serif;

    color: var(--gold);
    text-shadow: 3px 3px 0 var(--red-deep), 6px 6px 0 var(--black), 0 0 30px rgba(255,207,63,.6);
    letter-spacing: 2px;
    transform: skewX(-6deg);
    line-height: 1;
  }
  .jp-sub {
    font-family: 'DotGothic16', monospace;
    color: var(--neon);
    font-size: clamp(13px, 1.6vw, 18px);
    margin-top: 14px;
    letter-spacing: 6px;
    text-shadow: 0 0 8px var(--neon);
  }
  .ko-title {
    display: inline-block;
    margin-top: 18px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(18px, 2.4vw, 26px);

    border-radius: 12px;

  .progress-fill {
    height: 100%;
    background: repeating-linear-gradient(45deg, var(--red) 0 10px, var(--gold) 10px 20px);

    box-shadow: 0 0 12px var(--red);

  .progress-text {
    font-family: 'Bagel Fat One', sans-serif;
    color: var(--gold);

    color: var(--cream);

    background: var(--red);
    color: var(--cream);

  .quote {

  .btn {
    font-family: 'Black Han Sans', sans-serif;
    border: none;
    cursor: pointer;
    padding: 14px 36px;
    font-size: 20px;
    letter-spacing: 3px;
    border-radius: 50px;
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-deep) 100%);
    color: var(--red-deep);

  .intro {
    text-align: center;
    background: linear-gradient(180deg, #c41030 0%, #5a0612 100%);
    border: 5px solid var(--gold);
    border-radius: 20px;
    padding: 50px 28px;
    box-shadow: 0 0 0 4px var(--black), 0 0 40px rgba(255, 207, 63, .35);

  .intro p {
    font-size: 17px; line-height: 1.8; margin-bottom: 16px; color: var(--cream);
  }
  .intro .big {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 28px;
    color: var(--gold);
    margin: 18px 0;
    text-shadow: 2px 2px 0 var(--black);
  }
  .coins {
    font-size: 38px; margin: 14px 0;
    animation: coin 1.5s infinite;
  }
  @keyframes coin {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  /* 등장 애니메이션 */
  .fade-in { animation: fadeIn .5s ease both; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 공유 박스 */
  .share-row { display: flex; gap: 10px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
  .footer-note {
    text-align: center;
    margin-top: 40px;
    font-family: 'DotGothic16', monospace;
    color: rgba(255, 245, 224, .4);
    font-size: 12px;
    letter-spacing: 3px;
  }

  /* 콘페티 */
  .confetti {
    position: fixed; top: -10px; width: 10px; height: 10px;
    pointer-events: none; z-index: 99;
    animation: fall 3s linear forwards;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @media (max-width: 600px) {
    .stats { grid-template-columns: 1fr; }
    .opt { font-size: 15px; padding: 14px; }
  }
</style>
</head>

// ===== 상태 =====
let state = { idx: 0, scores: { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 }, started: false };
const app = document.getElementById('app');

// ===== 화면 렌더 =====
function renderIntro() {
  app.innerHTML = `
    <div class="intro fade-in">
      <div class="coins">🪙 🎰 🪙</div>
      <p class="big">잭팟이 터질지, 빈 손으로 나올지...</p>
      <p>당신이 파친코 홀에 들어선다면<br>어떤 플레이어가 될까요?</p>
      <p>12개의 짜릿한 상황을 통해<br>당신의 <b style="color:var(--gold)">파친코 인격</b>을 진단해드립니다.</p>
      <button class="btn" onclick="startTest()">▶ 게임 START</button>
    </div>
  `;
}

function renderQuestion() {
  const q = questions[state.idx];
  const total = questions.length;
  const pct = ((state.idx) / total) * 100;
  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-text">${state.idx + 1}/${total}</div>
    </div>
    <div class="card fade-in" key="${state.idx}">
      <div class="q-number">QUESTION ${String(state.idx + 1).padStart(2, '0')}</div>
      ${q.scene ? `<div class="q-scene">${q.scene}</div>` : ''}
      <div class="q-text">${q.q || '당신의 선택은?'}</div>
      <div class="options">
        ${q.opts.map((o, i) => `
          <button class="opt" onclick="answer('${o.axis}','${o.val}')">
            <span class="opt-num">${i + 1}</span>
            <span>${o.text}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function answer(axis, val) {
  state.scores[val]++;
  state.idx++;
  if (state.idx >= questions.length) {
    renderResult();
  } else {
    renderQuestion();
  }
}

function calcMBTI() {
  const s = state.scores;
  return (s.E >= s.I ? 'E' : 'I') + (s.S >= s.N ? 'S' : 'N') + (s.T >= s.F ? 'T' : 'F') + (s.J >= s.P ? 'J' : 'P');
}

function renderResult() {
  const type = calcMBTI();
  const r = results[type];
  app.innerHTML = `
    <div class="result fade-in">
      <div class="jackpot">🎰 大当たり JACKPOT! 🎰</div>
      <div class="mbti-badge">${type}</div>
      <div style="font-size:50px; margin: 6px 0;">${r.emoji}</div>
      <div class="nickname">${r.nickname}</div>
      <div class="nickname-jp">★ ${r.jp} ★</div>

      <div class="quote">${r.quote}</div>

      <div class="desc">${r.desc}</div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">RISK 베팅 과감성</div>
          <div class="stat-value">${r.risk}</div>
          <div class="stat-bar"><div class="stat-bar-fill" style="width:${r.risk}%"></div></div>
        </div>
        <div class="stat">
          <div class="stat-label">FOCUS 집중력</div>
          <div class="stat-value">${r.focus}</div>
          <div class="stat-bar"><div class="stat-bar-fill" style="width:${r.focus}%"></div></div>
        </div>
        <div class="stat">
          <div class="stat-label">SOCIAL 사교성</div>
          <div class="stat-value">${r.social}</div>
          <div class="stat-bar"><div class="stat-bar-fill" style="width:${r.social}%"></div></div>
        </div>
        <div class="stat">
          <div class="stat-label">CONTROL 자제력</div>
          <div class="stat-value">${r.control}</div>
          <div class="stat-bar"><div class="stat-bar-fill" style="width:${r.control}%"></div></div>
        </div>
      </div>

      <div class="share-row">
        <button class="btn" onclick="restart()">🔄 다시 하기</button>
        <button class="btn" onclick="copyResult('${type}')">📋 결과 복사</button>
      </div>
    </div>
  `;
  fireConfetti();
}

function startTest() {
  state.started = true;
  renderQuestion();
}

function restart() {
  state = { idx: 0, scores: { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 }, started: false };
  renderIntro();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyResult(type) {
  const r = results[type];
  const text = `🎰 파친코 MBTI 진단 결과 🎰\n\n${type} - ${r.nickname}\n${r.emoji} "${r.quote}"\n\n${r.desc}`;
  navigator.clipboard.writeText(text).then(() => {
    alert('결과가 복사되었어요! 붙여넣기로 공유하세요 🎰');
  }).catch(() => {
    alert('복사에 실패했어요. 직접 복사해주세요!');
  });
}

function fireConfetti() {
  const colors = ['#ffcf3f', '#e8264a', '#ff5fa2', '#00ffd5', '#fff5e0'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 0.6 + 's';
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    if (Math.random() > 0.5) c.style.borderRadius = '50%';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// 초기 렌더
renderIntro();
